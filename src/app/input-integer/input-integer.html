  <div class="input-group" >
                    <div class="input-group-prepend">
                      <button class="btn btn-primary btn-sm" (click)="downQuantity()">-</button> 
                     </div>
                  <input 
                  type="text"  class="text-center"
                  [(ngModel)]="quantity" 
                   (keyUp)="changeQuantity()" 
                       class="form-control form-control-sm d-inline-block w-auto text-center mx-1">
                    <div class="input-group-append">
                       <button class="btn btn-primary btn-sm " (click)="upQuantity()">+</button>
                    </div>
                </div>
